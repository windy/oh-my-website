<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{NAME}} - 个人主页</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="persona-coder">

    <!-- 顶部 Banner / Hero 区域，确保恰好一屏高度 -->
    <header id="home" class="hero">
        
        <!-- 巨大水印背书：默认展示拼音，极其淡的颜色 -->
        <div class="hero-watermark">
            <!-- 这个默认可以用 JS 或者后端去剥离，目前我们做死样式，到时候可以用插值占位 -->
            {{NAME_PINYIN|ZHANG SAN}}
        </div>

        <div class="hero-container">
            <div class="hero-content">
                <!-- 名字与身份 -->
                <h1 class="hero-title">{{NAME}}</h1>
                <p class="hero-subtitle">{{ROLE_LABEL|新媒体运营}}</p>
            </div>
            
            <!-- 人像区域，留出宽裕空间 -->
            <div class="hero-image">
                <img src="hero-sample.png" alt="人像" />
            </div>
        </div>

        <!-- 底部数据/标签栏，毛玻璃质感 -->
        <div class="hero-stats-wrapper">
            <div class="hero-stats">
                <div class="stats-label">
                    <span>个人标签</span>
                    <span class="arrow-circle">
                         <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"></polyline></svg>
                    </span>
                </div>
                <div class="stats-list">
                    <div class="stat-item">{{YEARS_EXPERIENCE|10}}年经验</div>
                    <div class="stat-item">10W+粉丝</div>
                    <div class="stat-item">GW认证</div>
                </div>
            </div>
        </div>
    </header>

    <!-- 主体内容区（后续模块扩展处） -->
    <main style="height: 100vh; display: flex; align-items: center; justify-content: center; background: #fff; color: #ccc;">
        <h2>下方模块尚未开发...</h2>
    </main>

</body>
</html>
